services:
  mc:
    container_name: band_server
    image: itzg/minecraft-bedrock-server:latest
    environment:
      EULA: "TRUE"
      SERVER_NAME: "Banda Server"
      GAMEMODE: survival
      DIFFICULTY: hard
    ports:
      - "19132:19132/udp"
    volumes:
      - ./data:/data
    stdin_open: true
    tty: true
    labels:
        - "com.centurylinklabs.watchtower.enable=true"
    restart: always

  pinggy:
    container_name: pinggy_tunnel
    build:
      context: .  # Use the current directory for the build context
    restart: always
    stdin_open: true
    tty: true

