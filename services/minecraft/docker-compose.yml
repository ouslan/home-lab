services:
  mc:
    container_name: band_server
    image: itzg/minecraft-bedrock-server:latest
    environment:
      EULA: "TRUE"
      SERVER_NAME: "Banda Server"
      GAMEMODE: survival
      DIFFICULTY: hard
    ports:
      - "19132:19132/udp"
    volumes:
      - ./data:/data
    stdin_open: true
    tty: true
    labels:
        - "com.centurylinklabs.watchtower.enable=true"
    restart: always

  ngrok:
    image: ngrok/ngrok:latest
    environment:
      - NGROK_AUTHTOKEN=${TOKEN}
    network_mode: host
    command: "tcp ${SERVER_IP}:19132"
    stdin_open: true
    tty: true
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: always
