services:
  api:
    container_name: FastAPI
    image: ghcr.io/gitinference/gitinference/jp-api:stagging
    restart: always
    secrets:
      - db-password
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: jp_data
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: 5551

    volumes:
      - ./data_folder:/app/data
    ports:
      - 5051:8000
    labels:
        - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - postgres_network
  django:
    container_name: jp_server
    image:
    environment:
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD}
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      DEV: True
      DEBUG: True
    command: >
      sh -c "python manage.py migrate &&
             python manage.py shell -c 'from django.contrib.auth.models import User; User.objects.filter(username=\"${DJANGO_SUPERUSER_USERNAME}\").exists() or User.objects.create_superuser(\"${DJANGO_SUPERUSER_USERNAME}\", \"${DJANGO_SUPERUSER_EMAIL}\", \"${DJANGO_SUPERUSER_PASSWORD}\")' &&
             python manage.py makemigrations &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    ports: 
      - 8057:8000
    networks:
      - api_network
    depends_on:
      database:
        condition: service_healthy
networks:
  postgres_network:
    external: true
