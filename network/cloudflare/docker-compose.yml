services:
  tunnel:
    container_name: cloudflared-tunnel
    image: cloudflare/cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    labels:
        - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - cloudflare_network

networks:
  cloudflare_network:
    driver: bridge
