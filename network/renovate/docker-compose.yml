services:
  renovate:
    image: renovate/renovate:latest
    container_name: renovate
    command: ["true"]
    labels:
      - "ofelia.enabled=true"
      - "ofelia.job-run.renovate-daily.schedule=@daily"
      - "ofelia.job-run.renovate-daily.command=renovate"
    volumes:
      - ./.configs/config.js:/usr/src/app/config.js
      - ./.configs/run-renovate.sh:/usr/src/app/run-renovate.sh
      - ./data:/tmp/renovate
    environment:
      RENOVATE_PLATFORM: forgejo
      RENOVATE_ONBOARDING: "true"
      RENOVATE_TIMEZONE: "America/Puerto_Rico"
      RENOVATE_LOCK_FILE_MAINTENANCE: "true"
      GITHUB_COM_TOKEN: ${GITHUB_COM_TOKEN}
      FORGEJO_TOKEN: ${FORGEJO_TOKEN}
      FORGEJO_REPOS: ${FORGEJO_REPOS}
      CODEBERG_TOKEN: ${CODEBERG_TOKEN}
      CODEBERG_REPOS: ${CODEBERG_REPOS}
      LOG_LEVEL: "debug"
    entrypoint: ["sh", "-c", "sleep infinity"]
    labels:
      ofelia.enabled: "true"

      # JOB 1: Forgejo
      ofelia.job-exec.renovate-forgejo.schedule: "@daily"
      ofelia.job-exec.renovate-forgejo.command: "/usr/src/app/run-renovate.sh forgejo"

      # JOB 2: Codeberg
      ofelia.job-exec.renovate-codeberg.schedule: "@daily"
      ofelia.job-exec.renovate-codeberg.command: "/usr/src/app/run-renovate.sh codeberg"

  ofelia:
    image: mcuadros/ofelia:latest
    depends_on:
      - renovate
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: daemon --docker

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

      LOG_LEVEL: debug

  scheduler:
    image: mcuadros/ofelia:latest
    container_name: renovate-scheduler
    depends_on:
      - renovate
    volumes:
      # Ofelia needs access to the docker socket to start the renovate container
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # Ensure the scheduler restarts if the machine reboots
    restart: always
